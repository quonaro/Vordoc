run:
  desc: Start the Vordoc server
  native: true

pass:
  desc: Hash a plaintext password for page access
  native: true
  args:
  - "password:str"

version:
  desc: Show version
  native: true

init:
  desc: Initialize a full-featured demo documentation (components, links, anchors, auth)
  native: true
  args:
  - "name:str?"
