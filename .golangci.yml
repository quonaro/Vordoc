version: "2"

run:
  timeout: 5m

linters:
  enable:
  # bugs / correctness
  - errcheck
  - govet
  - ineffassign
  - staticcheck
  # performance / style
  - gocritic
  - misspell
  - revive
  - unused
  # security
  - gosec
  exclusions:
    paths:
    - tmp
    - frontend/node_modules
    rules:
    - path: _test\.go$
      linters:
      - gosec

formatters:
  enable:
  - gofmt
  - goimports
  exclusions:
    paths:
    - tmp
    - frontend/node_modules
  settings:
    gofmt:
      simplify: true
