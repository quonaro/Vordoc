name: Release

on:
  push:
    tags:
    - 'v*' # Рекомендуется использовать префикс v для тегов

permissions:
  contents: write # Нужно для создания релиза и загрузки артефактов
  packages: write # Нужно для пуша в GHCR

env:
  GO_VERSION: '1.26.1' # Match go.mod
  NODE_VERSION: '22' # Node 22 - текущий LTS, стабильнее чем 24 для билдов
  PNPM_VERSION: '9'

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ env.PNPM_VERSION }}

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
        cache-dependency-path: frontend/pnpm-lock.yaml

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        pnpm install --frozen-lockfile

    - name: Frontend Lint & Format
      run: |
        cd frontend
        pnpm exec prettier --check .
        pnpm run lint:all

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6 # Обновленная версия
      with:
        version: v1.65.0
        args: --timeout=5m
        # Убедись, что в .golangci.yml включены линтеры gofmt/gofumpt

  build:
    name: Build Artifacts
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ env.PNPM_VERSION }}

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
        cache-dependency-path: frontend/pnpm-lock.yaml

    - name: Build Frontend
      run: |
        cd frontend
        pnpm install --frozen-lockfile
        pnpm run generate

    - name: Move Frontend Assets for Embedding
      run: |
        # Очищаем старую папку dist внутри Go проекта
        rm -rf internal/adapter/http/dist
        mkdir -p internal/adapter/http/dist
        # Копируем собранный фронтенд
        cp -R frontend/.output/public/. internal/adapter/http/dist/

    - name: Install Cross-Compilation Tools
      run: sudo apt-get update && sudo apt-get install -y zip

    - name: Build Binaries
      run: |
        set -euo pipefail

        # Используем имя тега как версию (например, v1.0.0)
        VERSION="${{ github.ref_name }}"
        mkdir -p dist

        targets=(
          "linux amd64 tar.gz vordoc"
          "linux arm64 tar.gz vordoc"
          "darwin amd64 tar.gz vordoc"
          "darwin arm64 tar.gz vordoc"
          "windows amd64 zip vordoc.exe"
        )

        for target in "${targets[@]}"; do
          read -r goos goarch ext binary <<< "$target"
          echo "==> Building ${goos}/${goarch} ..."

          output="vordoc_${goos}_${goarch}"
          if [ "$ext" = "zip" ]; then
            output="${output}.exe"
          fi

          CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
            go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "build/${output}" \
            ./cmd/vordoc

          # Архивирование
          cd build
          if [ "$ext" = "zip" ]; then
            zip "../dist/vordoc_${goos}_${goarch}.${ext}" "$output"
          else
            tar -czf "../dist/vordoc_${goos}_${goarch}.${ext}" "$output"
          fi
          cd ..

          # Очистка временных файлов
          rm -f "build/${output}"
        done

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: dist/*

  docker:
    name: Build and Push Docker Image
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=sha
          type=ref,event=tag

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ github.ref_name }}

  release:
    name: Create GitHub Release
    needs: [ build, docker ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Binaries
      uses: actions/download-artifact@v4
      with:
        name: binaries
        path: dist

    - name: Generate Checksums
      run: |
        cd dist
        sha256sum * > checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
        draft: false
        prerelease: false
