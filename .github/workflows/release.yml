name: Release

on:
  push:
    tags:
    - '*'

permissions:
  contents: read
  packages: write

env:
  GO_VERSION_FILE: go.mod
  NODE_VERSION: '24'
  PNPM_VERSION: '10'

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Ensure tag is on main
      run: |
        git fetch origin main
        git merge-base --is-ancestor "${{ github.sha }}" origin/main

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ env.PNPM_VERSION }}

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: pnpm
        cache-dependency-path: frontend/pnpm-lock.yaml

    - name: Frontend dependencies
      run: |
        cd frontend
        pnpm install --frozen-lockfile

    - name: Prepare Nuxt types
      run: |
        cd frontend
        pnpm exec nuxt prepare

    - name: Frontend format check
      run: |
        cd frontend
        pnpm exec prettier --check .

    - name: Frontend lint
      run: |
        cd frontend
        pnpm run lint:all

    - name: Go mod download
      run: go mod download

    - name: Go lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: latest
        args: run

    - name: Go format check
      uses: golangci/golangci-lint-action@v8
      with:
        version: latest
        args: fmt --diff

  build-docker:
    name: Build and push Docker image
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Determine image name
      run: |
        image="ghcr.io/${{ github.repository }}"
        echo "IMAGE_NAME=${image,,}" >> "$GITHUB_ENV"

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:${{ github.sha }}
        build-args: |
          VERSION=${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-binaries:
    name: Build release binaries
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ env.PNPM_VERSION }}

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: pnpm
        cache-dependency-path: frontend/pnpm-lock.yaml

    - name: Build frontend and embed dist
      run: |
        set -euo pipefail

        cd frontend
        pnpm install --frozen-lockfile
        pnpm run generate
        cd ..

        rm -rf internal/adapter/http/dist
        mkdir -p internal/adapter/http/dist
        cp -R frontend/.output/public/. internal/adapter/http/dist/

    - name: Install packaging tools
      run: sudo apt-get update && sudo apt-get install -y zip

    - name: Build and package binaries
      run: |
        set -euo pipefail

        version="${{ github.sha }}"
        mkdir -p build dist

        targets=(
          "linux amd64 tar.gz vordoc"
          "linux arm64 tar.gz vordoc"
          "darwin amd64 tar.gz vordoc"
          "darwin arm64 tar.gz vordoc"
          "windows amd64 zip vordoc.exe"
        )

        for target in "${targets[@]}"; do
          read -r goos goarch ext binary <<< "$target"
          echo "==> Building ${goos}/${goarch} ..."

          output="build/${binary}"
          CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
            go build \
            -ldflags="-s -w -X main.version=${version}" \
            -o "$output" \
            ./cmd/vordoc

          asset="dist/vordoc_${goos}_${goarch}.${ext}"
          cd build
          if [ "$ext" = "zip" ]; then
            zip "../${asset}" "$binary"
          else
            tar -czf "../${asset}" "$binary"
          fi
          cd ..

          rm -f "$output"
        done

    - name: Upload release assets
      uses: actions/upload-artifact@v4
      with:
        name: release-assets
        path: dist/*

  release:
    name: Create GitHub release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
    - name: Download release assets
      uses: actions/download-artifact@v4
      with:
        name: release-assets
        path: dist

    - name: Generate checksums
      run: |
        cd dist
        sha256sum vordoc_* > checksums.txt

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
