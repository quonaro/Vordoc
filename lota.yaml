ports:
  show: false
  script: |
    set -u
    for port in 12300 12301; do
      pids=$(lsof -ti :"$port" 2>/dev/null || true)
      if [ -n "$pids" ]; then
        echo "Killing process on port $port"
        echo "$pids" | xargs kill -9
      fi
    done

backend:
  dev:
    show: false
    depends:
    - ports
    script: air

frontend:
  dev:
    dir: frontend
    show: false
    depends:
    - ports
    script: pnpm dev

build:
  show: true
  script: |
    set -euo pipefail

    echo "==> Installing frontend dependencies..."
    (
      cd frontend
      pnpm install --frozen-lockfile
    )

    echo "==> Building frontend..."
    (
      cd frontend
      pnpm run generate
    )

    echo "==> Embedding frontend into backend..."
    rm -rf internal/adapter/http/dist
    mkdir -p internal/adapter/http/dist
    cp -R frontend/.output/public/. internal/adapter/http/dist/

    echo "==> Building Go binary..."
    go build -ldflags="-s -w" -o vordoc ./cmd/vordoc

    echo "==> Build complete: ./vordoc"

run:
  depends:
  - build
  script: ./vordoc
  vars:
  - "import:env .env"

dev:
  script: echo "Starting development server..."
  depends:
  - backend.dev
  - frontend.dev
  parallel: true
