repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-json
    exclude: ^frontend/tsconfig\.json$
  - id: check-added-large-files

- repo: https://github.com/golangci/golangci-lint
  rev: v2.12.2
  hooks:
  - id: golangci-lint-full
    args:
    - --config=.golangci.yml

- repo: local
  hooks:
  - id: oxlint
    name: oxlint
    entry: bash -c 'cd frontend && pnpm exec oxlint .'
    language: system
    types_or:
    - ts
    - vue
    - javascript
    pass_filenames: false

  - id: eslint
    name: eslint
    entry: bash -c 'cd frontend && pnpm exec eslint .'
    language: system
    types_or:
    - ts
    - vue
    - javascript
    pass_filenames: false

  - id: typecheck
    name: nuxt typecheck
    entry: bash -c 'cd frontend && pnpm exec nuxt typecheck'
    language: system
    types_or:
    - ts
    - vue
    - javascript
    pass_filenames: false

  - id: prettier
    name: prettier
    entry: bash -c 'cd frontend && pnpm exec prettier --check .'
    language: system
    files: ^frontend/
    pass_filenames: false
